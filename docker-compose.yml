services:
  meteor-quant:
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./user_strategies:/app/user_strategies
    environment:
      METEOR_DATA_DIR: /app/data
      METEOR_USER_STRATEGY_DIR: /app/user_strategies
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
